name: Release Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-build:
    name: Release compile (macOS + iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Compile Planner in Release configuration
        run: ./scripts/release-build.sh
